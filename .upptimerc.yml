# Change these first
owner: sagarkpanda # Your GitHub organization or username, where this repository lives
repo: upptime # The name of this repository

sites:
  - name: sagarpanda.com
    url: https://sagarpanda.com

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.sagarpanda.com
  #baseUrl: /upptime
  logoUrl: https://raw.githubusercontent.com/sagarkpanda/sagarkpanda/refs/heads/main/images/favicon.webp
  #favicon: https://raw.githubusercontent.com/sagarkpanda/sagarkpanda/refs/heads/main/images/favicon.webp
  name: Sagar Panda
  #introTitle: "Is **sagarpanda.com** down?"
  introMessage: This is a status page of Sagar Panda hosted on GitHub Pages
  #theme: night

  customFootHtml: |
    <script>
      (function() {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        function formatDates() {
          // Target h3 specifically as seen in your inspect tool
          const headings = document.querySelectorAll('h3');
          headings.forEach(h => {
            const text = h.innerText.trim();
            // Match DD/MM/YYYY
            const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (match) {
              const day = parseInt(match[1]);
              const monthIndex = parseInt(match[2]) - 1;
              const year = match[3];
              if (months[monthIndex]) {
                h.innerText = day + " " + months[monthIndex] + " " + year;
              }
            }
          });
        }
        formatDates();
        setTimeout(formatDates, 1000);
        setTimeout(formatDates, 3000);

        const observer = new MutationObserver(() => formatDates());
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>

  navbar:
    #- title: Status
     # href: /
    - title: Home
      href: https://sagarpanda.com/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

i18n:
  locale: en-GB
  day: "DD"
  month: "Mon"
  year: "YYYY"
  dateFormat: "DD/MM/YYYY"

notifications:
  - type: telegram
